name: Scrape Hot Sets

on:
  schedule:
    # Cada 3 horas UTC, saltando 6:00 y 18:00 (a esas horas corre el ciclo completo)
    # Hora Colombia (UTC-5): 7pm, 10pm, 4am, 7am, 10am, 4pm
    - cron: "0 0,3,9,12,15,21 * * *"
  workflow_dispatch:

jobs:
  hot:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        chunk: ["1","2"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install dependencies
        working-directory: scraper
        run: |
          npm install
          npx playwright install chromium --with-deps
      - name: Scrape chunk ${{ matrix.chunk }}
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node bulk_scrape_prices.js --chunk ${{ matrix.chunk }}
