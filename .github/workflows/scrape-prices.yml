name: Scrape Card Prices

on:
  schedule:
    # 1am Colombia (UTC-5) = 6am UTC
    - cron: "0 6 * * *"
    # 1pm Colombia (UTC-5) = 6pm UTC
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    strategy:
      fail-fast: false
      matrix:
        chunk: ["1", "2", "3", "4", "5"]

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install scraper dependencies
        working-directory: scraper
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Scrape chunk ${{ matrix.chunk }}
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node bulk_scrape_prices.js --chunk ${{ matrix.chunk }}
