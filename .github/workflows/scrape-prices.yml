name: Scrape Card Prices

on:
  schedule:
    # Corre todos los días a las 2am UTC (10pm Argentina)
    - cron: "0 2 * * *"
  workflow_dispatch:
    # También permite correrlo manualmente desde GitHub

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 300

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install scraper dependencies
        working-directory: scraper
        run: |
          npm init -y
          npm install playwright @supabase/supabase-js ws
          npx playwright install chromium --with-deps

      - name: Scrape all set prices
        working-directory: scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: node bulk_scrape_prices.js --all
